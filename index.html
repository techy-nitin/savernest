<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" sizes="60x60" href="./logo.png" />

    <!-- Mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO title -->
    <title>
      SaverNest – Best Laptop, Mobile & Gadget Deals in India
    </title>

    <!-- SEO description -->
    <meta
      name="description"
      content="Savernest helps you find the best deals on laptops, mobiles, earbuds and smartwatches under budget. Compare smarter before buying."
    />

    <!-- Keywords (minor impact but safe to include) -->
    <meta
      name="keywords"
      content="best laptop deals India, best phones under 20000, gadget deals India, Amazon deals India, budget gadgets India"
    />

    <!-- Author -->
    <meta name="author" content="Savernest" />

    <!-- Search engine instructions -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://savernest.in" />

    <!-- Open Graph (WhatsApp, LinkedIn preview) -->
    <meta property="og:title" content="Savernest – Smart Gadget Deals" />
    <meta
      property="og:description"
      content="Discover top budget tech deals before you buy. Save money with Savernest."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://savernest.in" />
    <meta property="og:image" content="https://savernest.in/preview.png" />

    <!-- Twitter preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Savernest – Smart Gadget Deals" />
    <meta
      name="twitter:description"
      content="Find curated tech deals under budget before buying online."
    />
    <meta name="twitter:image" content="https://savernest.in/preview.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
